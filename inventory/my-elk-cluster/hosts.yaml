all:
  hosts:
    node1:
      ansible_host: 192.168.56.101  # 你的 VM1
      ip: 192.168.56.101
      access_ip: 192.168.56.101
    node2:
      ansible_host: 192.168.56.102  # 你的 VM2
      ip: 192.168.56.102
      access_ip: 192.168.56.102
    node3:
      ansible_host: 192.168.56.103  # 你的 VM3
      ip: 192.168.56.103
      access_ip: 192.168.56.103
  children:
    kube_control_plane:
      hosts:
        node1:         # VM1 當大腦
    kube_node:
      hosts:
        node1:         # VM1 也下去跑 Pod (為了 ELK 3 節點)
        node2:
        node3:
    etcd:
      hosts:
        node1:
    k8s_cluster:
      children:
        kube_control_plane:
        kube_node:
